$kind: http-request
name: Listar Cuidados
method: GET
url: '{{baseUrl}}/inventario/{{inventarioId}}/cuidados'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      pm.test("Cuidados OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Cuidados es array", function () {
        pm.expect(json).to.be.an("array");
      });
      pm.test("Al menos un cuidado registrado", function () {
        pm.expect(json.length).to.be.above(0);
      });
