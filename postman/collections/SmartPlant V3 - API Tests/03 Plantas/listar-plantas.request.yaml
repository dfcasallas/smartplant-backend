$kind: http-request
name: Listar Plantas
method: GET
url: '{{baseUrl}}/plantas'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      pm.test("Listado de plantas OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Respuesta es array", function () {
        pm.expect(json).to.be.an("array");
      });
      if (Array.isArray(json) && json.length > 0) {
        pm.environment.set("plantaId", json[0].id);
      }
